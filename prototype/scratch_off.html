<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floki Scratch Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1e2f 0%, #0b0b1a 100%);
            font-family: 'Outfit', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(255, 140, 0, 0.3);
            text-transform: uppercase;
        }

        p {
            color: #a0a0b5;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .circles-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 2rem;
        }

        .circle-container {
            position: relative;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 3px solid rgba(255, 215, 0, 0.5);
            user-select: none;
            touch-action: manipulation;
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .circle-container:hover {
            transform: scale(1.05);
        }
        
        .circle-container:active {
            transform: scale(0.95);
        }

        .floki-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
            margin-left: 4px;
            display: inline-block;
        }

        .result {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            z-index: 1;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transition: opacity 0.3s ease-out;
            pointer-events: none; /* Let the container handle clicks now */
        }

        .total-display {
            font-size: 2rem;
            font-weight: 700;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.5s ease;
            opacity: 0.8;
        }

        .total-display.revealed {
            transform: scale(1.1);
            opacity: 1;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            border-color: rgba(255, 215, 0, 0.8);
        }

        .reset-btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #6c63ff 0%, #483dff 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            outline: none;
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.3);
            display: block;
            margin: 0 auto;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 99, 255, 0.5);
            background: linear-gradient(135deg, #7a72ff 0%, #574cff 100%);
        }

        .reset-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FLOKI SCRATCH</h1>
        <p id="subtitleText">Tap to Reveal (1 Free)</p>
        
        <div class="circles-row" id="circles-container">
            <!-- Circles injected via JS -->
        </div>

        <div class="total-display" id="total-display">
            Total: 0<img src="../assets/images/floki/floki%20icon.png" class="floki-icon" />
        </div>

        <button class="reset-btn" id="resetBtn" onclick="initGame()">Try Again</button>
    </div>

    <script>
        const container = document.getElementById('circles-container');
        const totalDisplay = document.getElementById('total-display');
        const subtitleText = document.getElementById('subtitleText');
        const resetBtn = document.getElementById('resetBtn');
        
        const possibleValues = [5, 10, 20, 50, 100];
        let circleData = [];
        let gamesPlayed = 0;

        function initGame() {
            if (gamesPlayed > 0) {
                subtitleText.textContent = 'PRICE AMOUNT HERE';
                resetBtn.textContent = 'Play Again';
            } else {
                subtitleText.textContent = 'Tap to Reveal (1 Free)';
                resetBtn.textContent = 'Try Again';
            }

            container.innerHTML = '';
            totalDisplay.innerHTML = 'Total: 0<img src="../assets/images/floki/floki%20icon.png" class="floki-icon" />';
            totalDisplay.classList.remove('revealed');
            circleData = [];

            for (let i = 0; i < 3; i++) {
                createCircle(i);
            }
            
            gamesPlayed++;
        }

        function createCircle(index) {
            const value = possibleValues[Math.floor(Math.random() * possibleValues.length)];
            
            const circleDiv = document.createElement('div');
            circleDiv.className = 'circle-container';

            const resultDiv = document.createElement('div');
            resultDiv.className = 'result';
            resultDiv.innerHTML = `${value}<img src="../assets/images/floki/floki%20icon.png" class="floki-icon" />`;

            const canvas = document.createElement('canvas');
            canvas.width = 110;
            canvas.height = 110;
            
            circleDiv.appendChild(resultDiv);
            circleDiv.appendChild(canvas);
            container.appendChild(circleDiv);

            const ctx = canvas.getContext('2d');
            
            // Draw initial gray layer
            ctx.globalCompositeOperation = 'source-over';
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#e0e0e0');
            gradient.addColorStop(0.5, '#9e9e9e');
            gradient.addColorStop(1, '#e0e0e0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle pattern
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.lineWidth = 2;
            for(let j = 0; j < canvas.width; j+=8) {
                ctx.beginPath(); ctx.moveTo(j, 0); ctx.lineTo(j, canvas.height); ctx.stroke();
            }

            const data = {
                index,
                value,
                canvas,
                ctx,
                isRevealed: false
            };
            circleData.push(data);

            // Add click listener directly to the container
            circleDiv.addEventListener('click', () => handleReveal(data));
        }

        function handleReveal(data) {
            if (data.isRevealed) return;
            
            data.isRevealed = true;
            data.canvas.style.opacity = '0';
            
            // Clear the canvas internally
            data.ctx.globalCompositeOperation = 'destination-out';
            data.ctx.fillRect(0, 0, data.canvas.width, data.canvas.height);

            updateTotal();
            checkAllRevealed();
        }

        function updateTotal() {
            const revealedTotal = circleData.filter(d => d.isRevealed).reduce((sum, d) => sum + d.value, 0);
            totalDisplay.innerHTML = `Total: ${revealedTotal}<img src="../assets/images/floki/floki%20icon.png" class="floki-icon" />`;
        }

        function checkAllRevealed() {
            if (circleData.every(d => d.isRevealed)) {
                totalDisplay.classList.add('revealed');
            }
        }

        // Start
        initGame();
    </script>
</body>
</html>
