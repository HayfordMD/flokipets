<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safe Cracker | Floki Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap');

        :root {
            --bg-color: #0f172a;
            --safe-bg: rgba(30, 41, 59, 0.8);
            --accent: #facc15;
            --accent-glow: rgba(250, 204, 21, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--safe-bg);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
        }

        header {
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--accent-glow);
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .jackpot-display {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(250, 204, 21, 0.2);
            animation: pulse-border 2s infinite alternate;
        }

        @keyframes pulse-border {
            0% { border-color: rgba(250, 204, 21, 0.1); box-shadow: 0 0 0 var(--accent-glow); }
            100% { border-color: rgba(250, 204, 21, 0.5); box-shadow: 0 0 15px var(--accent-glow); }
        }

        .jackpot-amount {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--success);
            margin-top: 0.25rem;
        }

        .safe-lock {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin: 1rem 0;
        }

        .digit-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .digit-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .digit-btn:active {
            transform: scale(0.8);
            color: var(--text-main);
        }

        .digit-display {
            width: 60px;
            height: 70px;
            background: #020617;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
            border: 2px solid #334155;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }

        .digit-display.status-perfect {
            border-color: var(--success);
            color: var(--success);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3), inset 0 5px 10px rgba(0,0,0,0.5);
            text-shadow: 0 0 10px var(--success);
        }

        .digit-display.status-exists {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.3), inset 0 5px 10px rgba(0,0,0,0.5);
            text-shadow: 0 0 10px var(--accent);
        }

        .digit-display.status-mixed {
            border-color: var(--accent); /* Yellow border */
            color: var(--success); /* Green text */
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.4), inset 0 5px 10px rgba(0,0,0,0.5);
            text-shadow: 0 0 10px var(--success);
        }

        .attempts-label {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-top: -0.5rem;
            transition: color 0.3s;
        }

        .action-btn {
            --btn-bg: #3b82f6;
            --btn-text: #ffffff;
            --btn-glow: rgba(59, 130, 246, 0.5);

            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 12px;
            padding: 16px 1rem;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--btn-glow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .action-btn:active {
            transform: translateY(2px) !important;
            box-shadow: 0 2px 5px var(--btn-glow) !important;
        }
        
        .action-btn:disabled {
            background: #334155 !important;
            color: #94a3b8 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
            animation: none !important;
        }

        .urgent-pulse {
            animation: urgentPulse 0.8s infinite alternate;
        }

        @keyframes urgentPulse {
            0% { transform: scale(1); box-shadow: 0 0 15px var(--btn-glow); }
            100% { transform: scale(1.05); box-shadow: 0 0 30px var(--btn-glow); }
        }

        .cost-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            opacity: 0.95;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 0.2rem;
        }

        .history-container {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 1rem;
            max-height: 140px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .history-container::-webkit-scrollbar { display: none; }
        .history-container { -ms-overflow-style: none; scrollbar-width: none; }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            padding: 0.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .history-guess-wordle {
            display: flex;
            gap: 0.5rem;
            margin: 0 auto;
        }

        .history-digit {
            width: 28px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            background: #020617;
            border: 1px solid #334155;
            color: var(--text-muted);
        }

        .history-digit.perfect {
            border-color: var(--success);
            color: var(--success);
            text-shadow: 0 0 5px var(--success);
        }

        .history-digit.exists {
            border-color: var(--accent);
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
        }

        .history-digit.mixed {
            border-color: var(--accent); /* Yellow */
            color: var(--success); /* Green */
            text-shadow: 0 0 5px var(--success);
        }

        .rules-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.4;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .shake { animation: shake 0.4s; }

        /* Overlay Modal */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 6, 23, 0.95);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 2rem;
            text-align: center;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }

        .title-win { color: var(--success); text-shadow: 0 0 20px var(--success); }
        .title-lose { color: var(--danger); text-shadow: 0 0 20px var(--danger); }

        .modal-text {
            margin-bottom: 2rem;
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .restart-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .restart-btn:active { background: var(--accent); color: #020617; }
        
        .legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: -0.5rem;
            margin-bottom: 0.5rem;
        }
        .legend-item { display: flex; align-items: center; gap: 0.25rem; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-dot.perfect { background: var(--success); box-shadow: 0 0 5px var(--success); }
        .legend-dot.exists { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .legend-dot.mixed { 
            background: var(--success);
            border: 2px solid var(--accent);
            box-shadow: 0 0 5px rgba(250, 204, 21, 0.5);
        }

    </style>
</head>
<body>

    <div class="app-container" id="app">
        <header>
            <h1>Safe Cracker</h1>
            <div class="subtitle">Break the code, take the vault.</div>
        </header>

        <div class="jackpot-display">
            <div class="subtitle">CURRENT JACKPOT</div>
            <div class="jackpot-amount">10,000 FLOKI</div>
        </div>

        <div class="safe-lock">
            <!-- Digits rendered by JS -->
        </div>

        <div class="attempts-label" id="attemptsLabel">5 Tries Remaining</div>

        <button class="action-btn" id="crackBtn">
            <span id="btnMainText">Attempt Crack</span>
            <span class="cost-label" id="costLabel">Cost: FREE</span>
        </button>

        <div class="legend">
            <div class="legend-item"><div class="legend-dot perfect"></div> Exact Spot</div>
            <div class="legend-item"><div class="legend-dot exists"></div> Wrong Spot</div>
            <div class="legend-item"><div class="legend-dot mixed"></div> More Left!</div>
        </div>

        <div class="history-container" id="history">
            <div class="rules-text" id="emptyHistoryText">
                5 Attempts daily.<br>Can you guess the combination?
            </div>
        </div>

        <div class="modal-overlay" id="endModal">
            <div class="modal-title" id="endTitle">CRACKED!</div>
            <div class="modal-text" id="endText">You successfully broke into the vault!</div>
            <button class="restart-btn" id="restartBtn">Play Again (100 FLOKI)</button>
        </div>
    </div>

    <script>
        // Game Logic
        let secretCode = [];
        let currentGuess = [0, 0, 0, 0];
        let attempts = 0;
        const maxAttempts = 5;
        const attemptCosts = ["FREE", "100 FLOKI", "500 FLOKI", "2,000 FLOKI", "5,000 FLOKI"];
        
        // Colors: Blue -> Green -> Yellow -> Orange -> Red
        const btnColors = [
            { bg: '#3b82f6', text: '#ffffff', glow: 'rgba(59, 130, 246, 0.5)' },
            { bg: '#22c55e', text: '#020617', glow: 'rgba(34, 197, 94, 0.5)' },
            { bg: '#eab308', text: '#020617', glow: 'rgba(234, 179, 8, 0.5)' },
            { bg: '#f97316', text: '#ffffff', glow: 'rgba(249, 115, 22, 0.5)' },
            { bg: '#ef4444', text: '#ffffff', glow: 'rgba(239, 68, 68, 0.5)' }
        ];

        let isGameOver = false;

        const safeLockEl = document.querySelector('.safe-lock');
        const historyEl = document.getElementById('history');
        const crackBtn = document.getElementById('crackBtn');
        const btnMainText = document.getElementById('btnMainText');
        const costLabel = document.getElementById('costLabel');
        const attemptsLabel = document.getElementById('attemptsLabel');
        const emptyHistoryText = document.getElementById('emptyHistoryText');
        
        const endModal = document.getElementById('endModal');
        const endTitle = document.getElementById('endTitle');
        const endText = document.getElementById('endText');
        const restartBtn = document.getElementById('restartBtn');

        function generateCode() {
            secretCode = [];
            for (let i = 0; i < 4; i++) {
                secretCode.push(Math.floor(Math.random() * 10));
            }
            console.log("Secret Code (for testing):", secretCode.join(''));
        }

        function renderLock() {
            safeLockEl.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const group = document.createElement('div');
                group.className = 'digit-group';

                const upBtn = document.createElement('button');
                upBtn.className = 'digit-btn';
                upBtn.innerHTML = '&#9650;';
                upBtn.onclick = () => changeDigit(i, 1);

                const display = document.createElement('div');
                display.className = 'digit-display';
                display.id = `digit-${i}`;
                display.innerText = currentGuess[i];

                const downBtn = document.createElement('button');
                downBtn.className = 'digit-btn';
                downBtn.innerHTML = '&#9660;';
                downBtn.onclick = () => changeDigit(i, -1);

                group.appendChild(upBtn);
                group.appendChild(display);
                group.appendChild(downBtn);
                safeLockEl.appendChild(group);
            }
        }

        function changeDigit(index, delta) {
            if (isGameOver) return;
            
            currentGuess[index] += delta;
            if (currentGuess[index] > 9) currentGuess[index] = 0;
            if (currentGuess[index] < 0) currentGuess[index] = 9;
            
            const display = document.getElementById(`digit-${index}`);
            display.innerText = currentGuess[index];
            
            display.classList.remove('status-perfect', 'status-exists', 'status-mixed');
            
            display.style.transform = delta > 0 ? 'translateY(-2px)' : 'translateY(2px)';
            setTimeout(() => { display.style.transform = 'translateY(0)'; }, 50);
        }

        function checkGuess() {
            if (isGameOver) return;

            if (emptyHistoryText) {
                emptyHistoryText.style.display = 'none';
            }

            let secretCopy = [...secretCode];
            let guessCopy = [...currentGuess];
            let statuses = ['none', 'none', 'none', 'none'];

            // Pass 1: exact matches
            for (let i = 0; i < 4; i++) {
                if (guessCopy[i] === secretCopy[i]) {
                    statuses[i] = 'perfect';
                    secretCopy[i] = null;
                    guessCopy[i] = -1;
                }
            }

            // Pass 2: wrong spot matches
            for (let i = 0; i < 4; i++) {
                if (guessCopy[i] !== -1) {
                    const matchIndex = secretCopy.indexOf(guessCopy[i]);
                    if (matchIndex !== -1) {
                        statuses[i] = 'exists';
                        secretCopy[matchIndex] = null;
                    }
                }
            }
            
            // Pass 3: Check for remaining duplicates "left on the board"
            // If a digit was a perfect match, but that same digit STILL exists in the remaining secretCopy,
            // it means the secret code has another instance of this number that hasn't been found.
            // In this case, we change the perfect match's status to 'mixed' (Green text, Yellow border)
            for(let i=0; i<4; i++) {
                if(statuses[i] === 'perfect') {
                    const digit = currentGuess[i];
                    if (secretCopy.includes(digit)) {
                        statuses[i] = 'mixed';
                    }
                }
            }

            // Apply styles
            for (let i = 0; i < 4; i++) {
                const display = document.getElementById(`digit-${i}`);
                display.classList.remove('status-perfect', 'status-exists', 'status-mixed');
                if (statuses[i] === 'perfect') {
                    display.classList.add('status-perfect');
                } else if (statuses[i] === 'exists') {
                    display.classList.add('status-exists');
                } else if (statuses[i] === 'mixed') {
                    display.classList.add('status-mixed');
                }
            }

            addHistoryItemWordle(currentGuess, statuses);

            attempts++;
            
            // Winning condition: 4 greens (either perfect or mixed, both mean correct spot)
            const correctSpots = statuses.filter(s => s === 'perfect' || s === 'mixed').length;

            if (correctSpots === 4) {
                triggerWin();
            } else {
                document.getElementById('app').classList.remove('shake');
                void document.getElementById('app').offsetWidth; 
                document.getElementById('app').classList.add('shake');

                if (attempts >= maxAttempts) {
                    triggerLose();
                } else {
                    updateUIForNextAttempt();
                }
            }
        }

        function addHistoryItemWordle(guessArray, statusArray) {
            const item = document.createElement('div');
            item.className = 'history-item';

            const guessEl = document.createElement('div');
            guessEl.className = 'history-guess-wordle';
            
            for(let i = 0; i < 4; i++) {
                const digitBox = document.createElement('div');
                digitBox.className = 'history-digit';
                digitBox.innerText = guessArray[i];
                if (statusArray[i] === 'perfect') digitBox.classList.add('perfect');
                if (statusArray[i] === 'exists') digitBox.classList.add('exists');
                if (statusArray[i] === 'mixed') digitBox.classList.add('mixed');
                guessEl.appendChild(digitBox);
            }

            item.appendChild(guessEl);
            historyEl.insertBefore(item, historyEl.firstChild);
        }

        function updateUIForNextAttempt() {
            const remaining = maxAttempts - attempts;
            attemptsLabel.innerText = `${remaining} ${remaining === 1 ? 'Try' : 'Tries'} Remaining`;
            
            if(remaining === 1) {
                attemptsLabel.style.color = 'var(--danger)';
            } else {
                attemptsLabel.style.color = 'var(--text-muted)';
            }

            costLabel.innerText = `Cost: ${attemptCosts[attempts]}`;
            
            // Dynamic Button Color
            const style = btnColors[attempts];
            crackBtn.style.setProperty('--btn-bg', style.bg);
            crackBtn.style.setProperty('--btn-text', style.text);
            crackBtn.style.setProperty('--btn-glow', style.glow);

            // Dynamic Button Size (shrinks main text, increases cost size, decreases padding)
            const basePadding = 16; // px
            const baseMainSize = 1.1; // rem
            const baseCostSize = 0.75; // rem
            
            crackBtn.style.padding = `${basePadding - (attempts * 2)}px 1rem`;
            btnMainText.style.fontSize = `${baseMainSize - (attempts * 0.08)}rem`;
            costLabel.style.fontSize = `${baseCostSize + (attempts * 0.18)}rem`;

            // Add intense pulsing animation on the final attempt
            if (attempts === maxAttempts - 1) {
                crackBtn.classList.add('urgent-pulse');
            } else {
                crackBtn.classList.remove('urgent-pulse');
            }
        }

        function triggerWin() {
            isGameOver = true;
            crackBtn.disabled = true;
            crackBtn.classList.remove('urgent-pulse');
            endTitle.innerText = "CRACKED!";
            endTitle.className = "modal-title title-win";
            endText.innerText = `You broke the code in ${attempts} attempt(s) and won the 10,000 FLOKI jackpot!`;
            
            setTimeout(() => {
                endModal.classList.add('active');
            }, 800);
        }
        
        function triggerLose() {
            isGameOver = true;
            crackBtn.disabled = true;
            crackBtn.classList.remove('urgent-pulse');
            endTitle.innerText = "LOCKED OUT";
            endTitle.className = "modal-title title-lose";
            endText.innerText = `You failed to crack the safe.\nThe code was ${secretCode.join('')}. Try again tomorrow!`;
            
            setTimeout(() => {
                endModal.classList.add('active');
            }, 800);
        }

        function resetGame() {
            isGameOver = false;
            attempts = 0;
            currentGuess = [0, 0, 0, 0];
            crackBtn.disabled = false;
            
            updateUIForNextAttempt();
            generateCode();
            renderLock();
            
            endModal.classList.remove('active');
            historyEl.innerHTML = '';
            if(emptyHistoryText) {
                emptyHistoryText.style.display = 'block';
                historyEl.appendChild(emptyHistoryText);
            }
        }

        crackBtn.addEventListener('click', checkGuess);
        restartBtn.addEventListener('click', resetGame);

        // Initialize
        resetGame();

    </script>
</body>
</html>
